# Prefix: Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold] #S '
set -g status-left-length 30
set -g status-right '#[fg=#a6adc8] %H:%M '
set -g status-right-length 50

# Window status
setw -g window-status-current-format '#[fg=#89b4fa,bold] #I:#W '
setw -g window-status-format '#[fg=#6c7086] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Resurrect settings (save/restore sessions)
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Claude Code workflow bindings
bind C-c new-window -n 'claude' 'claude'  # Prefix + Ctrl-c opens Claude Code
bind C-n split-window -h -l 40% 'claude'  # Prefix + Ctrl-n opens Claude in right pane

# Quick layout: Neovim left, Claude right
bind C-l split-window -h -l 40% 'claude' \; select-pane -L \; send-keys 'nvim .' Enter

# Send pane contents to clipboard (useful for sharing with Claude)
bind C-y capture-pane -S -10000 \; save-buffer /tmp/tmux-capture.txt \; display "Pane captured!"

# Bell notification when command completes (for Claude background work)
set -g bell-action any
set -g visual-bell off

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
